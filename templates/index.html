<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homelab Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #242424;
            --border: #2e2e2e;
            --text: #e0e0e0;
            --muted: #888;
            --accent: #00bcd4;
            --green: #4caf50;
            --yellow: #ff9800;
            --red: #f44336;
            --font: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 13px;
            padding: 20px;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        header h1 { color: var(--accent); font-size: 18px; letter-spacing: 2px; }
        #hostname { color: var(--muted); font-size: 12px; }
        #timestamp { color: var(--muted); font-size: 11px; }
        #status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 6px; }
        #status-dot.error { background: var(--red); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            width: 100%;
        }

        .card-title {
            color: var(--accent);
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .metric-label { color: var(--muted); }
        .metric-value { color: var(--text); font-weight: bold; }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--surface2);
            border-radius: 2px;
            margin: 6px 0 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .progress-fill.green { background: var(--green); }
        .progress-fill.yellow { background: var(--yellow); }
        .progress-fill.red { background: var(--red); }

        .disk-partitions { display: flex; flex-direction: column; gap: 10px; }
        .disk-row .disk-label { color: var(--muted); margin-bottom: 4px; }

        .net-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; gap: 8px; }
        .net-iface { color: var(--accent); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; flex: 1; }
        .net-stats { color: var(--muted); white-space: nowrap; flex-shrink: 0; }

        .wide { grid-column: 1 / -1; }

        #uptime { color: var(--muted); font-size: 11px; }

        /* Tab bar */
        #tab-bar {
            display: flex;
            gap: 4px;
            border-bottom: 1px solid #45475a;
            margin-bottom: 20px;
        }
        .tab {
            padding: 6px 16px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
            color: #a6adc8;
            border-bottom: 2px solid transparent;
            transition: color 0.15s;
        }
        .tab:hover { color: #cdd6f4; }
        .tab.active {
            color: #cdd6f4;
            border-bottom-color: #89b4fa;
        }
        .view { display: block; }
        .view.hidden { display: none; }

        /* All-hosts grid */
        #host-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }
        .host-card {
            background: #1e1e2e;
            border: 1px solid #45475a;
            border-radius: 6px;
            padding: 16px;
            font-family: 'JetBrains Mono', monospace;
        }
        .host-card .host-name { font-size: 1em; color: #cdd6f4; margin-bottom: 8px; }
        .host-card .host-stat { font-size: 0.8em; color: #a6adc8; line-height: 1.8; }
        .host-card .offline { color: #f38ba8; }
        .host-card .online-badge::before { content: "● "; color: #a6e3a1; }
        .host-card .offline-badge::before { content: "● "; color: #f38ba8; }

        /* Host detail header */
        #host-detail-header {
            font-size: 13px;
            color: #cdd6f4;
            margin-bottom: 16px;
        }
        #host-detail-header .offline { color: #f38ba8; }
        #host-detail-header .online-badge::before { content: "● "; color: #a6e3a1; }
        #host-detail-header .offline-badge::before { content: "● "; color: #f38ba8; }
    </style>
</head>
<body>

<header>
    <div>
        <h1>HOMELAB DASHBOARD</h1>
        <div id="hostname">loading...</div>
    </div>
    <div style="text-align:right">
        <div><span id="status-dot"></span><span id="status-text">connecting</span></div>
        <div id="timestamp"></div>
        <div id="uptime"></div>
    </div>
</header>

<!-- Tab bar — populated by dashboard.js -->
<nav id="tab-bar"></nav>

<!-- All hosts summary view -->
<div id="view-all" class="view">
    <div id="host-grid"></div>
</div>

<!-- Single host detail view -->
<div id="view-host" class="view hidden">
    <div id="host-detail-header"></div>
    <div class="grid">

        <!-- CPU Card -->
        <div class="card" id="card-cpu">
            <div class="card-title">CPU</div>
            <div class="metric-row">
                <span class="metric-label">Usage</span>
                <span class="metric-value" id="cpu-percent">—</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="cpu-bar"></div>
            </div>
            <div class="metric-row">
                <span class="metric-label">Cores</span>
                <span class="metric-value" id="cpu-cores">—</span>
            </div>
            <div class="metric-row">
                <span class="metric-label">Load avg (1/5/15m)</span>
                <span class="metric-value" id="cpu-load">—</span>
            </div>
        </div>

        <!-- Memory Card -->
        <div class="card" id="card-memory">
            <div class="card-title">Memory</div>
            <div class="metric-row">
                <span class="metric-label">Usage</span>
                <span class="metric-value" id="mem-percent">—</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="mem-bar"></div>
            </div>
            <div class="metric-row">
                <span class="metric-label">Used / Total</span>
                <span class="metric-value" id="mem-used">—</span>
            </div>
            <div class="metric-row">
                <span class="metric-label">Available</span>
                <span class="metric-value" id="mem-available">—</span>
            </div>
            <div class="metric-row">
                <span class="metric-label">Swap</span>
                <span class="metric-value" id="mem-swap">—</span>
            </div>
        </div>

        <!-- Disk Card -->
        <div class="card" id="card-disk">
            <div class="card-title">Disk</div>
            <div class="disk-partitions" id="disk-partitions"></div>
        </div>

        <!-- Network Card -->
        <div class="card" id="card-network">
            <div class="card-title">Network</div>
            <div id="network-interfaces"></div>
        </div>
    </div>
</div>

<script src="/static/dashboard.js"></script>
</body>
</html>
