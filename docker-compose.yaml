services:
  homelab-dashboard:
    build: .
    container_name: homelab-dashboard
    ports:
      - "8000:8000"
    environment:
      - DASHBOARD_TITLE=My Home Lab
      - DASHBOARD_SUBTITLE=Locally hosted!
    volumes:
      - ./hosts.yaml:/app/hosts.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3