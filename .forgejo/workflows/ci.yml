name: CI Pipeline

on:
  push:
    branches:
      - '**'        # every branch push triggers lint and test
  pull_request:
    branches:
      - main

jobs:

  lint-and-test:
    name: Lint and Test
    runs-on: docker
    container:
      image: nikolaik/python-nodejs:python3.12-nodejs20

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt

      - name: Run flake8 linter
        run: |
          flake8 app/ tests/ --max-line-length=100

      - name: Run pytest
        run: |
          pytest tests/ -v

  build-image:
    name: Build Docker Image
    runs-on: docker
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    container:
      image: nikolaik/python-nodejs:python3.12-nodejs20
      env:
        DOCKER_HOST: tcp://dind:2375
    services:
      dind:
        image: docker:dind
        options: --privileged
        env:
          DOCKER_TLS_CERTDIR: ""

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install Docker CLI
        run: apt-get update -qq && apt-get install -y -qq docker.io

      - name: Debug network
        run: |
          echo "DOCKER_HOST=$DOCKER_HOST"
          cat /etc/hosts
          nc -zv dind 2375 || echo "port 2375 unreachable"
          nc -zv dind 2376 || echo "port 2376 unreachable"

      - name: Wait for Docker daemon
        run: |
          for i in $(seq 1 30); do
            docker info && break
            echo "attempt $i failed, retrying..."
            sleep 2
          done

      - name: Build Docker image
        run: |
          docker build -t homelab-dashboard:latest .
          docker tag homelab-dashboard:latest homelab-dashboard:${{ github.sha }}

      - name: Confirm image was built
        run: docker images | grep homelab-dashboard