name: CI Pipeline

on:
  push:
    branches:
      - '**'        # every branch push triggers lint and test
  pull_request:
    branches:
      - main

jobs:

  lint-and-test:
    name: Lint and Test
    runs-on: docker
    container:
      image: nikolaik/python-nodejs:python3.12-nodejs20

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt -r requirements-dev.txt

      - name: Run flake8 linter
        run: |
          python -m flake8 app/ agent/ core/ tests/ --max-line-length=100

      - name: Run pytest
        run: |
          python -m pytest tests/ -v

